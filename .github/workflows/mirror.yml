name: mirror-espn
on:
  schedule:
    # every 30 min, only during active match hours: 16:00-23:59 UTC + 00:00-06:00 UTC
    # (10:00-24:00 CT — covers observed WC2026 kickoffs 10:00-21:30 CT plus ET/penalties buffer)
    - cron: '*/30 16-23,0-6 * * *'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: curl -sf 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260628-20260719' > scoreboard.json
      - run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add scoreboard.json
          git diff --staged --quiet || git commit -m "mirror $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
